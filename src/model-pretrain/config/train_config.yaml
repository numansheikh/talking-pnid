# ─────────────────────────────────────────────────────────────────────────────
# P&ID Detection Model — Training Configuration
# Step 6: Prepare Training Configuration
#
# Model:   YOLOv8m  (medium — good balance of accuracy vs training time)
# Dataset: datasets/augmented/  (161k train tiles, 9.6k val tiles)
# Task:    object detection (nc=9 unified P&ID classes)
# Hardware: RTX 3090 24GB
# ─────────────────────────────────────────────────────────────────────────────

# ── Model ────────────────────────────────────────────────────────────────────
model: yolov8m.pt          # pretrained COCO weights — transfer learning baseline
# Alternatives (uncomment to switch):
# model: yolov8s.pt        # smaller, faster — use if VRAM < 6 GB
# model: yolov8l.pt        # larger, more accurate — use if VRAM >= 16 GB
# model: yolo11m.pt        # YOLO11 — slightly better than v8 on small objects

# ── Data ─────────────────────────────────────────────────────────────────────
data: datasets/augmented/dataset.yaml
imgsz: 640                 # matches tile size from Step 3

# ── Training schedule ────────────────────────────────────────────────────────
epochs: 100
patience: 20               # early stopping — stop if val mAP doesn't improve for 20 epochs
batch: 32                  # RTX 3090 24GB + AMP handles 32 comfortably at 640px
workers: 8

# ── Optimizer ────────────────────────────────────────────────────────────────
optimizer: AdamW
lr0: 0.001                 # initial LR (lower than default 0.01 — fine-tuning from COCO)
lrf: 0.01                  # final LR = lr0 * lrf (cosine decay)
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# ── Loss weights ─────────────────────────────────────────────────────────────
box: 7.5                   # bbox regression loss weight
cls: 0.5                   # classification loss weight
dfl: 1.5                   # distribution focal loss weight

# ── Online augmentation (Ultralytics built-in) ────────────────────────────────
# We already did offline augmentation in Step 5, so reduce online aug intensity.
hsv_h: 0.01                # minimal hue shift (P&IDs are B&W line drawings)
hsv_s: 0.2                 # saturation
hsv_v: 0.2                 # value / brightness
degrees: 0.0               # no arbitrary rotation (already done offline at 90°)
translate: 0.05            # modest translation
scale: 0.3                 # zoom variation
shear: 0.0                 # no shear (distorts engineering symbols)
perspective: 0.0001        # tiny perspective — simulates scan skew
flipud: 0.3                # vertical flip (already done offline)
fliplr: 0.4                # horizontal flip
mosaic: 0.5                # mosaic (4-image composite) — good for context
mixup: 0.05                # very light mixup
copy_paste: 0.0            # no copy-paste (complex for dense P&IDs)

# ── Hardware ─────────────────────────────────────────────────────────────────
device: 0                  # CUDA GPU 0 (RTX 3090 24GB)
amp: true                  # Automatic Mixed Precision — safe on CUDA, ~50% VRAM saving

# ── Output ───────────────────────────────────────────────────────────────────
project: runs/detect
name: pid_baseline_yolov8m
exist_ok: false
save: true
save_period: 10            # save checkpoint every 10 epochs
plots: true                # save training curves

# ── Evaluation ───────────────────────────────────────────────────────────────
val: true
iou: 0.5                   # IoU threshold for mAP@0.5
conf: 0.001                # low conf threshold at val time (find all detections)
max_det: 500               # max detections per image (P&IDs can be dense)
